<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./game/" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; base-uri 'none'; form-action 'none'"
    />
    <link rel="icon" href="./assets/icon.webp" type="image/webp" />
    <link rel="canonical" href="./game/" />
    <title>Abyss Summoner</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
        background: #090b12;
        color: #f3efe6;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(420px, calc(100vw - 40px));
        text-align: center;
      }

      a {
        color: #f6c76f;
        font-weight: 700;
      }

      p {
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Abyss Summoner</h1>
      <p>Opening the playable browser build.</p>
      <p><a href="./game/">Open the game</a></p>
    </main>
  </body>
</html>
