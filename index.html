<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./game/" />
    <link rel="canonical" href="./game/" />
    <link rel="icon" href="./assets/icon.png" type="image/png" />
    <title>Abyss Summoner</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          "Pretendard",
          "Apple SD Gothic Neo",
          "Segoe UI",
          sans-serif;
        background: #090b12;
        color: #f3efe6;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(420px, calc(100vw - 40px));
        text-align: center;
      }

      a {
        color: #f6c76f;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Abyss Summoner</h1>
      <p>Playable build is opening.</p>
      <p><a href="./game/">Open the game</a></p>
    </main>
    <script>
      window.location.replace("./game/");
    </script>
  </body>
</html>
